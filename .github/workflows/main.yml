name: MacCloud-Desktop

on:
  workflow_dispatch:

jobs:
  mac-desktop:
    runs-on: macos-latest

    steps:
      - name: Enable macOS GUI session
        run: |
          echo "Enabling screen sharing..."

          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on -restart -agent -privs -all

      - name: Install lightweight desktop (noVNC stack)
        run: |
          echo "Installing noVNC..."

          brew install python3 git

          git clone https://github.com/novnc/noVNC.git
          git clone https://github.com/novnc/websockify noVNC/utils/websockify

      - name: Start macOS VNC server
        run: |
          echo "Starting VNC service..."

          VNC_PASSWORD="githubactions"

          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -configure -clientopts -setvnclegacy -vnclegacy yes \
            -setvncpw -vncpw "$VNC_PASSWORD"

      - name: Install ngrok (fixed v3)
        run: |
          ARCH=$(uname -m)

          if [ "$ARCH" = "arm64" ]; then
            URL="https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-darwin-arm64.tgz"
          else
            URL="https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-darwin-amd64.tgz"
          fi

          curl -sSL "$URL" -o ngrok.tgz
          tar -xzf ngrok.tgz
          chmod +x ngrok
          sudo mv ngrok /usr/local/bin/

      - name: Configure ngrok
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          ngrok config add-authtoken "$NGROK_AUTH_TOKEN"

      - name: Start VNC + Web access tunnel
        run: |
          echo "Starting tunnels..."

          # Start VNC (5900)
          nohup sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate > vnc.log 2>&1 &

          sleep 5

          # Expose via HTTP (better than raw TCP)
          nohup ngrok http 5900 --log=stdout > ngrok.log 2>&1 &

          sleep 10

          echo "==== NGROK PUBLIC URL ===="
          curl -s http://127.0.0.1:4040/api/tunnels | python3 -m json.tool || true

      - name: Keep session alive
        run: |
          echo "Desktop running..."
          while true; do sleep 3600; done
