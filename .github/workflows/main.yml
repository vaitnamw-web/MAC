name: MacVNC-Pro

on:
  workflow_dispatch:

jobs:
  mac-vnc:
    runs-on: macos-latest

    steps:
      - name: Enable Screen Sharing (VNC)
        run: |
          echo "Enabling macOS Screen Sharing..."

          VNC_PASSWORD="githubactions"

          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on -restart -agent -privs -all

          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -configure -clientopts -setvnclegacy -vnclegacy yes \
            -setvncpw -vncpw "$VNC_PASSWORD"

      - name: Install ngrok (v3 stable)
        run: |
          echo "Installing ngrok..."

          curl -sSL https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null

          # Detect CPU architecture
          ARCH=$(uname -m)

          if [ "$ARCH" = "arm64" ]; then
            URL="https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-darwin-arm64.tgz"
          else
            URL="https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-darwin-amd64.tgz"
          fi

          curl -sSL "$URL" -o ngrok.tgz
          tar -xzf ngrok.tgz
          chmod +x ngrok
          sudo mv ngrok /usr/local/bin/

          ngrok version

      - name: Configure ngrok auth
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          echo "Configuring ngrok..."
          ngrok config add-authtoken "$NGROK_AUTH_TOKEN"

      - name: Start VNC tunnel (FIXED)
        run: |
          echo "Starting ngrok tunnel for VNC (5900)..."

          nohup ngrok tcp 5900 --log=stdout > ngrok.log 2>&1 &

          sleep 8

          echo "===================="
          echo "NGROK STATUS OUTPUT"
          echo "===================="

          curl -s http://127.0.0.1:4040/api/tunnels || echo "ngrok API not ready yet"

          echo "===================="
          echo "RAW LOGS"
          echo "===================="
          cat ngrok.log || true

      - name: Keep runner alive
        run: |
          echo "Session active..."
          while true; do sleep 3600; done
