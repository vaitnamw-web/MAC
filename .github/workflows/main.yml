name: MacVNC

on:
  workflow_dispatch:

jobs:
  mac-vnc:
    runs-on: macos-latest

    steps:
      - name: Enable Screen Sharing (VNC)
        run: |
          echo "Enabling macOS Screen Sharing..."

          # Set VNC password (change this or use secrets)
          VNC_PASSWORD="githubactions"

          # Enable Remote Management / Screen Sharing
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on -restart -agent -privs -all

          # Set VNC password
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -configure -clientopts -setvnclegacy -vnclegacy yes \
            -setvncpw -vncpw "$VNC_PASSWORD"

      - name: Install ngrok
        run: |
          curl -sSL https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-stable-darwin-amd64.zip -o ngrok.zip
          unzip ngrok.zip
          chmod +x ngrok
          sudo mv ngrok /usr/local/bin/

      - name: Start ngrok tunnel
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          ngrok config add-authtoken "$NGROK_AUTH_TOKEN"

          # Start VNC tunnel (port 5900)
          nohup ngrok tcp 5900 > ngrok.log &

          sleep 5
          echo "=== NGROK PUBLIC URL ==="
          curl -s http://127.0.0.1:4040/api/tunnels | python3 -m json.tool

      - name: Keep session alive
        run: |
          echo "Mac VNC is running..."
          while true; do sleep 3600; done
